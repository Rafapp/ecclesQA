<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;" />
  <title>Magic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="titlebar">
    <img class="titlebar__icon" src="icon-24.png" alt="" />
    <span class="titlebar__title" id="app-title">Magic</span>
  </header>

  <main class="main">
    <section class="scripts-section">
      <h2 class="section-heading">Automations</h2>
      <div class="table-wrap">
        <table class="scripts-table" aria-label="Available scripts">
          <thead>
            <tr>
              <th class="col-name">Script</th>
              <th class="col-desc">Description</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="scripts-body">
            <tr class="placeholder-row"><td colspan="3">Loading scripts…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- ── Run dialog overlay ─────────────────────────────────────────────────── -->
  <div class="run-overlay hidden" id="run-overlay" role="dialog" aria-modal="true" aria-label="Run script">
    <div class="run-dialog">

      <!-- Header -->
      <div class="run-dialog__header">
        <span class="run-dialog__title" id="run-title">Run Script</span>
        <button class="btn btn--ghost" id="run-close" type="button" aria-label="Close">✕</button>
      </div>

      <!-- I/O configuration (shown before run starts) -->
      <div class="run-config" id="run-config">
        <div id="run-inputs"></div>
        <div id="run-outputs"></div>

        <div class="run-config__auto">
          <label class="auto-approve-label">
            <input type="checkbox" id="auto-approve-chk" />
            <span class="auto-approve-text">Auto-approve all steps</span>
          </label>
          <span class="auto-approve-warn">Only recommended for long / overnight runs</span>
        </div>

        <div class="run-config__actions">
          <button class="btn btn--secondary" id="run-cancel-btn" type="button">Cancel</button>
          <button class="btn btn--primary"   id="run-launch-btn" type="button">Run</button>
        </div>
      </div>

      <!-- Step timeline (shown while running) -->
      <div class="run-timeline hidden" id="run-timeline">
        <ol class="timeline-list" id="timeline-list"></ol>
      </div>

      <!-- Confirm panel (shown when a confirm step fires) -->
      <div class="run-confirm hidden" id="run-confirm">
        <div class="confirm-message" id="confirm-message"></div>
        <ul class="confirm-items" id="confirm-items"></ul>
        <div class="confirm-actions">
          <button class="btn btn--danger"   id="confirm-abort-btn"    type="button">Abort</button>
          <button class="btn btn--primary"  id="confirm-continue-btn" type="button">Continue</button>
        </div>
      </div>

      <!-- Footer shown after completion -->
      <div class="run-footer hidden" id="run-footer">
        <span class="run-result-msg" id="run-result-msg"></span>
        <div class="run-footer__actions">
          <button class="btn btn--secondary" id="open-output-btn" type="button">Open Output Folder</button>
          <button class="btn btn--primary"   id="run-done-btn"    type="button">Close</button>
        </div>
      </div>

    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
